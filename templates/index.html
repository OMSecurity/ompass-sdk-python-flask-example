<!DOCTYPE html>
<html lang="{{ get_locale() }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('index.title') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- DEMO Banner -->
<div class="top-bar">
    <div class="top-bar-inner">
        <span class="demo-badge">DEMO</span>
        <span>{{ _('common.demo.banner') }}</span>
    </div>
</div>

<!-- Header -->
<header class="site-header">
    <div class="header-inner">
        <a href="/" class="logo">
            <span class="logo-text">DemoMail</span>
        </a>
        <div class="lang-switcher">
            <a href="?lang=ko">한국어</a>
            <a href="?lang=en">EN</a>
            <a href="?lang=ja">日本語</a>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="main-content">
    <div class="container">

        <div class="login-content-box" style="max-width: 480px; margin: 60px auto; text-align: center;">
            <div style="margin-bottom: 24px;">
                <span class="logo-text" style="font-size: 32px;">DemoMail</span>
            </div>
            <p style="font-size: 15px; color: #5f6368; margin-bottom: 32px;">{{ _('index.desc') }}</p>
            <div class="button-group" style="justify-content: center;">
                <a href="/login" class="btn btn-primary">{{ _('common.login') }}</a>
                <a href="/register" class="btn btn-secondary">{{ _('common.register') }}</a>
            </div>
        </div>

    </div>
</main>

<!-- Footer -->
<footer class="site-footer">
    <div class="footer-inner">
        <p style="font-size: 12px; color: #80868b; text-align: center;">DemoMail - OMPASS SDK Example | &copy; 2025</p>
    </div>
</footer>

</body>
</html>
